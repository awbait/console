# Bootstrap "app-of-apps" — the ONE generic mechanism that turns every
# application.yaml the portal commits into a live Argo Application, with NO
# per-repo wiring.
#
# How it works (two cheap levels):
#   1. The SCM-provider (GitLab) generator auto-discovers EVERY repo under the
#      `managed-services` group (incl. team subgroups). New team/chart repos the
#      portal creates on the fly are picked up automatically.
#   2. For each discovered repo it creates ONE "directory" Application that
#      recursively applies that repo's `**/application.yaml` files as CRs. Those
#      committed files are themselves full multi-source Applications (chart from
#      OCI + adjacent values.yaml via $values) generated by the portal
#      (internal/provisioning/gitops.go), so they fully describe each deployment.
#
# Adding a service = the portal commits <service>/application.yaml+values.yaml in
# its chart repo; the repo's directory-app syncs and the new child Application
# appears. No edits here.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: portal-app-of-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - scmProvider:
        # Poll GitLab every 60s so newly-created repos appear quickly.
        requeueAfterSeconds: 60
        gitlab:
          group: "managed-services"
          api: http://host.docker.internal:8929
          includeSubgroups: true
          allBranches: false
          tokenRef:
            secretName: gitlab-scm-token
            key: token
  template:
    metadata:
      # Unique, DNS-safe name per repo (repository can repeat across teams, so
      # disambiguate with a short hash of the clone URL).
      name: "repo-{{ lower .repository }}-{{ trunc 8 (sha1sum .url) }}"
    spec:
      project: portal-managed
      source:
        # GitLab SCM provider returns .url as an SSH clone URL; rewrite it to the
        # HTTP URL that matches the Argo repo-creds (and is reachable via the
        # CoreDNS host.docker.internal mapping).
        repoURL: "http://host.docker.internal:8929/{{ .url | trimPrefix \"git@host.docker.internal:\" }}"
        targetRevision: "{{ .branch }}"
        path: "."                          # scan the whole repo (required for a directory source)
        directory:
          recurse: true
          include: "**/application.yaml"   # only the Application CRs, not values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd                  # child Applications live in argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          # Allow pruning down to zero children: when the LAST service in a repo
          # is deleted the repo has no application.yaml left, and without this
          # Argo refuses the auto-sync ("auto-sync will wipe out all resources").
          allowEmpty: true
