# Prometheus scrape config for the IDP portal.
# The portal exposes /metrics (promhttp) on its HTTP port. It runs from source on
# the host (`make run-oidc`), reached from this container at host.docker.internal.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: idp-portal
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8080

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
