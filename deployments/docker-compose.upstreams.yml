# Opt-in overlay for the real-upstreams flow: adds a real GitLab CE alongside the
# backing services. The portal runs on the HOST (OIDC) against the REAL Argo CD +
# Harbor from the local KinD stand (see deployments/kind/). Bring the stand up
# FIRST (`make stand-up`) - it writes ARGOCD_TOKEN into deployments/.env. Then:
#
#   make up-upstreams-infra   # GitLab + Postgres + Valkey + Keycloak in Docker
#   make gitlab-seed          # once GitLab reports healthy
#   deployments/scripts/run-oidc.ps1 -RealGitlab   # portal on the host (OIDC)
#   make web                  # SPA on :5173
#
# GitLab is heavy (~4 GB RAM, ~3-5 min to boot). It uses external_url
# host.docker.internal:8929 so the SAME repoURL resolves from the host browser
# (clickable MR links), the portal container, AND the Argo pods inside KinD (via
# the CoreDNS patch in deployments/kind/10-coredns.ps1).
services:
  gitlab:
    image: gitlab/gitlab-ce:17.5.1-ce.0
    hostname: gitlab
    shm_size: 256m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://host.docker.internal:8929'
        nginx['listen_port'] = 8929
        gitlab_rails['initial_root_password'] = 'changeme-please-12345'
        # trim everything the GitOps flow doesn't need, to fit a laptop.
        # prometheus_monitoring disables the whole bundle (prometheus, exporters,
        # alertmanager). Grafana was removed from omnibus in 16.0 - no key for it.
        prometheus_monitoring['enable'] = false
        gitlab_kas['enable'] = false
        registry['enable'] = false
        gitlab_rails['gitlab_default_projects_features_container_registry'] = false
        puma['worker_processes'] = 2
        sidekiq['max_concurrency'] = 5
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-logs:/var/log/gitlab
      - gitlab-data:/var/opt/gitlab
      - ./gitlab/seed.rb:/seed.rb:ro
    ports:
      - "8929:8929"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8929/-/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s

  # The portal is not a compose service - it runs on the host with OIDC and the
  # real-upstream URLs (GitLab :8929, Harbor :8084, Argo :8083 via the published
  # host ports). See deployments/scripts/run-oidc.ps1 -RealGitlab.

volumes:
  gitlab-config:
  gitlab-logs:
  gitlab-data:
