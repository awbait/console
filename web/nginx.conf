server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy API to the Go backend. In dev-auth mode inject X-Dev-* so the SPA
  # (and EventSource SSE, which cannot set headers) authenticate. For OIDC,
  # drop these and let the session cookie pass through.
  location /api/ {
    proxy_pass http://portal:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Dev-Teams "core";
    proxy_set_header X-Dev-Role "member";

    # SSE-friendly
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
